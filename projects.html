<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" href="public/favicon.ico" type="image/x-icon"/>
  <link rel="icon" href="public/favicon.png" type="image/png"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <link rel="stylesheet" href="shared.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})"></script>
  <script src="shared.js"></script>
  <title>Projects &#8212; Iv&#225;n Villegas-P&#233;rez</title>
</head>
<body>
<header class="site-nav"><div class="nav-inner"><a class="nav-brand" href="index.html">Iván Villegas-Pérez</a><nav class="nav-links"><a class="nav-link" href="index.html" id="nav-home" data-en="About" data-es="Sobre mí">About</a><a class="nav-link" href="projects.html" id="nav-projects" data-en="Projects" data-es="Proyectos">Projects</a><a class="nav-link" href="education.html" id="nav-education" data-en="Education" data-es="Formación">Education</a><a class="nav-link" href="conferences.html" id="nav-conferences" data-en="Conferences" data-es="Congresos">Conferences</a><a class="nav-link" href="index.html#news" data-en="News" data-es="Noticias">News</a><a class="nav-link" href="index.html#contact" data-en="Contact" data-es="Contacto">Contact</a><div style="display:flex;gap:.5rem"><a class="nav-btn" href="public/CV.pdf" target="_blank" rel="noopener">CV &#8599;</a><a class="nav-btn" href="public/CVA.pdf" target="_blank" rel="noopener">CVA &#8599;</a></div><div class="lang-sw"><button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button><button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button></div><button class="theme-btn" onclick="cycleTheme()"><span id="theme-icon">&#8857;</span><span class="theme-tip" id="theme-tooltip">Sistema</span></button></nav></div></header>
<section style="border-bottom:1px solid var(--border)">
  <div class="container page-header">
    <p class="page-kicker" data-en="Projects" data-es="Proyectos">Projects</p>
    <h1 class="page-h1" data-en="Scientific projects" data-es="Proyectos cient&#237;ficos">Scientific projects</h1>
    <p class="page-lede" data-en="Thesis work, course projects and research internships. Click any title to open its dedicated page with figures and full text." data-es="Trabajos de tesis, proyectos de asignatura y pr&#225;cticas de investigaci&#243;n. Pulsa cualquier t&#237;tulo para abrir su p&#225;gina dedicada con figuras y texto completo.">Thesis work, course projects and research internships. Click any title to open its dedicated page.</p>
  </div>
</section>
<div class="container" style="padding-top:3rem;padding-bottom:5rem">
  <ol class="proj-list" id="proj-list"></ol>
</div>
<footer class="site-footer"><div class="footer-inner"><p id="footer-copy"></p><p class="footer-updated" id="footer-date"></p></div></footer>
<script>
function renderPage(){
  renderStaticText();
  var es=lang==='es';
  var el=document.getElementById('proj-list');if(!el)return;
  el.innerHTML=PROJECTS.map(function(p){
    var title=es&&p.titleEs?p.titleEs:p.title;
    var nature=es&&p.natureEs?p.natureEs:p.nature;
    var context=es&&p.contextEs?p.contextEs:p.context;
    var abstract=es&&p.abstractEs?p.abstractEs:p.abstract;
    var pplLabel=p.peopleLabel==='Co-authors'?(es?'Coautores':'Co-authors'):(es?'Tutores':'Supervisors');
    var people=p.collaborators.map(function(c){return esc(c.name)+' <span style="color:var(--muted);">('+esc(es&&c.roleEs?c.roleEs:c.role)+')</span>';}).join('; ');
    var readLabel=es?'Leer informe &#8599;':'Read report &#8599;';

    return '<li class="proj-entry"><div class="proj-meta"><div class="proj-year">'+esc(p.year)+'</div><div class="proj-nature">'+esc(nature)+'</div></div><div><div style="display:flex;flex-wrap:wrap;align-items:flex-start;gap:.75rem"><a class="proj-title-btn" href="'+p.pageUrl+'">'+esc(title)+'</a>'+instBadges(p.institutions)+'</div><p class="proj-context">'+esc(context)+'</p><p class="proj-abstract">'+esc(abstract)+'</p><p class="proj-people"><em>'+pplLabel+' &middot; </em>'+people+'</p><div class="proj-tags">'+p.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'<div class="proj-links">'+(p.reportPdf?'<a class="link-primary" href="'+p.reportPdf+'" target="_blank" rel="noopener">'+readLabel+'</a>':'')+'<a class="link-muted" href="'+p.githubUrl+'" target="_blank" rel="noreferrer">GitHub &#8599;</a></div></div></div></li>';
  }).join('');
  renderFooter();
}
setNavActive('projects');
applyTheme();
document.getElementById('btn-en').classList.toggle('active',lang==='en');
document.getElementById('btn-es').classList.toggle('active',lang==='es');
document.documentElement.lang=lang==='es'?'es':'en';
renderPage();
</script>
</body>
</html>
