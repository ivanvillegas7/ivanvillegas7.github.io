<script>
var _kEN="Course project \u00b7 AST5220 Cosmology II \u00b7 University of Oslo \u00b7 June 2024",_kES="Proyecto de asignatura \u00b7 AST5220 Cosmolog\u00eda II \u00b7 Universidad de Oslo \u00b7 junio de 2024";
var _tEN="Computing the CMB power spectrum",_tES="C\u00e1lculo del espectro de potencias del CMB";
var _bEN="Iv\u00e1n Villegas-P\u00e9rez \u2014 Supervisors: Prof. David F. Mota & Dr. Hans A. Winther (UiO)",_bES="Iv\u00e1n Villegas-P\u00e9rez \u2014 Tutores: Prof. David F. Mota y Dr. Hans A. Winther (UiO)";
var _inst=["uio"];
var _secs=[{"h2en": "Abstract", "h2es": "Resumen", "items": [{"t": "p", "en": "A four-stage C++ pipeline built on top of the AST5220 template that predicts the CMB and matter power spectra from first principles: background cosmology, recombination history, linear perturbations and the line-of-sight integration that produces $C_{\\ell}$. The pipeline reproduces a standard ΛCDM expansion history, a Saha–Peebles recombination, scale-dependent perturbation evolution and a CMB temperature power spectrum consistent with theoretical expectations.", "es": "Una cadena de cuatro etapas en C++ construida sobre la plantilla de AST5220 que predice los espectros de potencias del CMB y de la materia a partir de primeros principios: cosmología de fondo, historia de la recombinación, perturbaciones lineales y la integración en la línea de visión que produce $C_{\\ell}$. La cadena reproduce una historia de expansión ΛCDM estándar, una recombinación de Saha–Peebles y un espectro de potencias de temperatura del CMB acorde con las expectativas teóricas."}]}, {"h2en": "I. Cosmological parameters", "h2es": "I. Parámetros cosmológicos", "items": [{"t": "p", "en": "The baseline parameters used throughout the pipeline are:", "es": "Los parámetros base utilizados en toda la cadena son:"}, {"t": "math", "tex": "\\begin{aligned}h&=0.67,\\\\T_{\\text{CMB},0}&=2.7255\\,\\text{K},\\\\N_{\\text{eff}}&=3.046,\\\\\\Omega_{B,0}&=0.05,\\\\\\Omega_{\\text{CDM},0}&=0.267,\\\\\\Omega_{k,0}&=0,\\\\n_{s}&=0.965,\\\\A_{s}&=2.1\\times10^{-9}.\\end{aligned}"}]}, {"h2en": "II. Background cosmology", "h2es": "II. Cosmología de fondo", "items": [{"t": "p", "en": "Working in flat FLRW with $x=\\ln a$, the code computes $H(x)$, the conformal time $\\eta(x)$, the cosmic time $t(x)$, and the standard distance measures. The radiation density today follows from the CMB temperature via $\\Omega_{\\gamma,0}$, and the neutrino density analogously.", "es": "Trabajando en FLRW plano con $x=\\ln a$, el código calcula $H(x)$, el tiempo conforme $\\eta(x)$, el tiempo cósmico $t(x)$ y las medidas estándar de distancia."}, {"t": "math", "tex": "\\Omega_{\\gamma,0}=\\frac{2\\pi^{2}}{30}\\frac{(k_{B}T_{\\text{CMB},0})^{4}}{\\hbar^{3}c^{5}}\\frac{8\\pi G}{3H_{0}^{2}}"}, {"t": "fig", "src": "public/figures/cmb/omegas.png", "n": 1, "cen": "Density parameters $\\Omega_{i}(x)$ showing the three cosmological epochs.", "ces": "Parámetros de densidad $\\Omega_{i}(x)$ mostrando las tres épocas cosmológicas."}, {"t": "fig", "src": "public/figures/cmb/eta_over_c.png", "n": 2, "cen": "Conformal time $\\eta(x)/c$ — the comoving horizon — vs $x=\\ln a$.", "ces": "Tiempo conforme $\\eta(x)/c$ — el horizonte comóvil — frente a $x=\\ln a$."}]}, {"h2en": "III. Recombination history", "h2es": "III. Historia de la recombinación", "items": [{"t": "p", "en": "The free electron fraction $X_{e}(x)$ is solved with the Saha equation deep in equilibrium and with the Peebles ODE around recombination. From $X_{e}$ we obtain the optical depth $\\tau(x)$, its derivatives and the visibility function $\\tilde{g}(x)=-\\tau'(x)\\exp[-\\tau(x)]$.", "es": "La fracción de electrones libres $X_{e}(x)$ se resuelve con la ecuación de Saha en equilibrio y con la EDO de Peebles en torno a la recombinación. A partir de $X_{e}$ se obtiene la profundidad óptica $\\tau(x)$, sus derivadas y la función de visibilidad $\\tilde{g}(x)=-\\tau'(x)\\exp[-\\tau(x)]$."}, {"t": "fig", "src": "public/figures/cmb/Xe.png", "n": 3, "cen": "Free-electron fraction $X_{e}(x)$: Saha early, Peebles through recombination.", "ces": "Fracción de electrones libres $X_{e}(x)$: Saha al principio, Peebles durante la recombinación."}, {"t": "fig", "src": "public/figures/cmb/tau.png", "n": 4, "cen": "Optical depth $\\tau(x)$ and its first two derivatives — visibility peaks at last scattering.", "ces": "Profundidad óptica $\\tau(x)$ y sus dos primeras derivadas — la visibilidad alcanza su máximo en la última dispersión."}]}, {"h2en": "IV. Linear perturbations", "h2es": "IV. Perturbaciones lineales", "items": [{"t": "p", "en": "The Einstein–Boltzmann hierarchy is integrated for each Fourier mode $k$, starting from tight-coupling initial conditions. Outputs include the metric potentials $\\Phi$, $\\Psi$, density contrasts and velocities for CDM, baryons and photons, and the temperature multipoles $\\Theta_\\ell$.", "es": "La jerarquía de Einstein–Boltzmann se integra para cada modo de Fourier $k$, partiendo de condiciones iniciales de acoplamiento estrecho. Las salidas incluyen los potenciales métricos $\\Phi$, $\\Psi$, los contrastes de densidad y velocidades para CDM, bariones y fotones, y los multipolos de temperatura $\\Theta_\\ell$."}, {"t": "fig", "src": "public/figures/cmb/density.png", "n": 5, "cen": "Density perturbations for CDM, baryons and photons for several $k$.", "ces": "Perturbaciones de densidad para CDM, bariones y fotones para varios valores de $k$."}]}, {"h2en": "V. CMB and matter power spectra", "h2es": "V. Espectros de potencias del CMB y de la materia", "items": [{"t": "p", "en": "The line-of-sight integral gives the temperature transfer functions $\\Theta_\\ell(k,x=0)$ and, after convolution with the primordial power spectrum, the angular power spectrum:", "es": "La integral en la línea de visión da las funciones de transferencia de temperatura $\\Theta_\\ell(k,x=0)$ y, tras convolucionar con el espectro primordial, el espectro angular de potencias:"}, {"t": "math", "tex": "C_{\\ell}=4\\pi\\int\\frac{dk}{k}\\,P_{\\text{prim}}(k)\\,|\\Theta_{\\ell}(k)|^{2}"}, {"t": "fig", "src": "public/figures/cmb/cmb_ps.png", "n": 6, "cen": "CMB temperature angular power spectrum $D_{\\ell}=\\ell(\\ell+1)C_{\\ell}/(2\\pi)$ — acoustic peaks and Silk damping.", "ces": "Espectro angular de potencias de temperatura del CMB $D_{\\ell}=\\ell(\\ell+1)C_{\\ell}/(2\\pi)$ — picos acústicos y amortiguamiento de Silk."}, {"t": "fig", "src": "public/figures/cmb/matter_ps.png", "n": 7, "cen": "Total matter power spectrum $P(k)$, with the turnover at matter–radiation equality.", "ces": "Espectro de potencias total de la materia $P(k)$, con el cambio de pendiente en la igualdad materia–radiación."}, {"t": "fig", "src": "public/figures/cmb/cmb_map.png", "n": 8, "cen": "Full-sky CMB temperature map generated from the computed $C_\\ell$.", "ces": "Mapa de cielo completo de temperatura del CMB generado a partir de los $C_\\ell$ calculados."}, {"t": "note", "en": "A condensed Astronomy & Astrophysics-style write-up summarises the four milestones; the per-milestone reports with the detailed derivations are bundled in the GitHub repository.", "es": "Un resumen al estilo Astronomy & Astrophysics condensa los cuatro hitos; los informes por hito con todas las deducciones están en el repositorio de GitHub."}]}];

  var html='';
  _secs.forEach(function(sec){
    html+='<section class="ft-section"><h2 class="ft-h2">'+esc(es?sec.h2es:sec.h2en)+'</h2>';
    sec.items.forEach(function(x){
      if(x.t==='p') html+='<p class="ft-p">'+esc(es?x.es:x.en)+'</p>';
      else if(x.t==='h3') html+='<h3 class="ft-h3">'+esc(es?x.es:x.en)+'</h3>';
      else if(x.t==='math') html+='<div class="ft-math">$$'+x.tex+'$$</div>';
      else if(x.t==='note') html+='<aside class="ft-note">'+esc(es?x.es:x.en)+'</aside>';
      else if(x.t==='fig') html+='<figure class="ft-figure"><img src="'+x.src+'" alt="Fig.'+x.n+'" loading="lazy"><figcaption>Fig. '+x.n+'. '+esc(es?x.ces:x.cen)+'</figcaption></figure>';
    });
    html+='</section>';
  });
  document.getElementById('ft-body').innerHTML=html;
  renderFooter();
  renderKatex();
}
setNavActive('projects');applyTheme();document.getElementById('btn-en').classList.toggle('active',lang==='en');document.getElementById('btn-es').classList.toggle('active',lang==='es');document.documentElement.lang=lang==='es'?'es':'en';renderPage();
</script>
